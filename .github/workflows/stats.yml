name: Update README stats cards

on:
  schedule:
    - cron: "0 3 * * *" # roda uma vez por dia, às 03:00 UTC
  workflow_dispatch: # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  build:
    name: Gerar cards de estatísticas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar card de estatísticas gerais
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=izazh2&show_icons=true&theme=radical&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens mais usadas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=izazh2&layout=compact&langs_count=7&theme=radical
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitar os cards atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: atualiza cards de estatísticas" || exit 0
          git push
